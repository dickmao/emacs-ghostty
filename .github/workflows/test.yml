name: CI

on:
  pull_request:
    paths-ignore:
    - '**.rst'
    - '**.texi'
  push:
    paths-ignore:
    - '**.rst'
    - '**.texi'
    branches-ignore:
    - 'master'
    - 'main'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - uses: mlugg/setup-zig@v2.2.1
      with:
        version: 0.15.2

    - name: apt-get
      if: startsWith(runner.os, 'Linux')
      run: |
        sudo apt-get -yq update
        DEBIAN_FRONTEND=noninteractive sudo apt-get -yq install libxml2-dev libgccjit-11-dev emacs libtool libtool-bin libltdl-dev

    - name: brew-haha
      if: startsWith(runner.os, 'macOS')
      run: |
        brew install emacs libgccjit libxml2 libtool

    - name: test
      run: |
        make test
        make install
